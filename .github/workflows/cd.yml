name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:

  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_ENABLED == 'true' }}

    runs-on: ubuntu-latest

    steps:

      - name: Validate SSH configuration
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "ERROR: EC2_HOST secret missing"
            exit 1
          fi

          if [ -z "${{ secrets.EC2_USER }}" ]; then
            echo "ERROR: EC2_USER secret missing"
            exit 1
          fi

          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "ERROR: EC2_SSH_KEY secret missing"
            exit 1
          fi

          echo "SSH configuration looks good"

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            if [ ! -d ~/github-actions-kubernetes-masterclass/.git ]; then
              git clone https://github.com/${{ github.repository }}.git ~/github-actions-kubernetes-masterclass
            fi

            cd ~/github-actions-kubernetes-masterclass

            git fetch origin main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              echo ".env file missing"
              exit 1
            fi

            source .env

            echo $DOCKERHUB_TOKEN | docker login -u $DOCKERHUB_USERNAME --password-stdin

            docker compose pull

            docker compose up -d --remove-orphans

            docker image prune -af
