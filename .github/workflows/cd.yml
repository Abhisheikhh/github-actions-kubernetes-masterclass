name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

    branches:
      - main

jobs:

  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_ENABLED == 'true' }}

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to EC2

        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            set -e

            if [ ! -d ~/github-actions-kubernetes-masterclass ]; then
              git clone ${{ github.server_url }}/${{ github.repository }}.git ~/github-actions-kubernetes-masterclass
            fi

            cd ~/github-actions-kubernetes-masterclass

            git pull origin main

            if [ ! -f .env ]; then
              echo ".env file missing"
              exit 1
            fi

            docker compose pull

            docker compose up -d --remove-orphans

            docker image prune -af
