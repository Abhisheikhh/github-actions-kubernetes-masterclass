name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:

  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_ENABLED == 'true' }}

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to Azure VM

        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          password: ${{ secrets.EC2_PASSWORD }}

          script: |

            set -e

            if [ ! -d ~/github-actions-kubernetes-masterclass/.git ]; then

              git clone https://github.com/${{ github.repository }}.git ~/github-actions-kubernetes-masterclass

            fi

            cd ~/github-actions-kubernetes-masterclass

            git pull origin main

            source .env

            echo $DOCKERHUB_TOKEN | docker login -u $DOCKERHUB_USERNAME --password-stdin

            docker compose pull

            docker compose up -d --remove-orphans

            docker image prune -af
