name: CI

on:
  push:
    branches:
      - main

    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

env:
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate configuration
        run: |
          echo "DEPLOY_ENABLED=${{ vars.DEPLOY_ENABLED }}"

          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "ERROR: DOCKERHUB_USERNAME secret missing"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "ERROR: DOCKERHUB_TOKEN secret missing"
            exit 1
          fi

          echo "All required secrets are present"

      - name: Login to DockerHub
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}

        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6

        with:
          context: ./backend

          push: ${{ vars.DEPLOY_ENABLED == 'true' }}

          tags: |
            ${{ env.IMAGE_NAMESPACE }}/skillpulse-backend:latest
            ${{ env.IMAGE_NAMESPACE }}/skillpulse-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6

        with:
          context: ./frontend

          push: ${{ vars.DEPLOY_ENABLED == 'true' }}

          tags: |
            ${{ env.IMAGE_NAMESPACE }}/skillpulse-frontend:latest
            ${{ env.IMAGE_NAMESPACE }}/skillpulse-frontend:${{ github.sha }}
