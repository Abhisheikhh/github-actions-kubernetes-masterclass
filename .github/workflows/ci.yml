name: DevSecOps CI

on:
  push:
    branches:
      - main

    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

env:
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  build-and-push:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate configuration
        run: |
          echo "DEPLOY_ENABLED=${{ vars.DEPLOY_ENABLED }}"

          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "ERROR: DOCKERHUB_USERNAME secret missing"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "ERROR: DOCKERHUB_TOKEN secret missing"
            exit 1
          fi

          echo "All required secrets are present"

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0

      - name: Login to DockerHub
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}

        uses: docker/login-action@v3

        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Backend Image
        uses: docker/build-push-action@v6

        with:
          context: ./backend
          load: true

          push: ${{ vars.DEPLOY_ENABLED == 'true' }}

          tags: |
            ${{ env.IMAGE_NAMESPACE }}/skillpulse-backend:latest
            ${{ env.IMAGE_NAMESPACE }}/skillpulse-backend:${{ github.sha }}

      - name: Build Frontend Image
        uses: docker/build-push-action@v6

        with:
          context: ./frontend
          load: true

          push: ${{ vars.DEPLOY_ENABLED == 'true' }}

          tags: |
            ${{ env.IMAGE_NAMESPACE }}/skillpulse-frontend:latest
            ${{ env.IMAGE_NAMESPACE }}/skillpulse-frontend:${{ github.sha }}

      - name: Run Trivy Backend Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAMESPACE }}/skillpulse-backend:${{ github.sha }}
          format: table
          exit-code: 0

      - name: Run Trivy Frontend Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAMESPACE }}/skillpulse-frontend:${{ github.sha }}
          format: table
          exit-code: 0

      - name: Update Backend Manifest
        run: |
          sed -i "s|image: .*skillpulse-backend.*|image: ${{ env.IMAGE_NAMESPACE }}/skillpulse-backend:${{ github.sha }}|g" k8s/20-backend.yaml

      - name: Update Frontend Manifest
        run: |
          sed -i "s|image: .*skillpulse-frontend.*|image: ${{ env.IMAGE_NAMESPACE }}/skillpulse-frontend:${{ github.sha }}|g" k8s/30-frontend.yaml

      - name: Commit Updated Manifests
        run: |

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/

          git commit -m "deploy: update images to ${{ github.sha }}" || echo "No changes"

          git push
